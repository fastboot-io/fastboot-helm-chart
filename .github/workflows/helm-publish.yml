name: Publish Helm Chart (OCI + gh-pages)

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push to gh-pages
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Get version from Chart.yaml
      - name: Get chart version
        id: chart_version
        run: |
          VERSION=$(grep '^version:' charts/fastboot-helm-chart/Chart.yaml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Chart version is $VERSION"

      # ---------------------------
      # 1) Publish to OCI (GHCR)
      # ---------------------------
      - name: Package Helm chart for OCI
        run: |
          mkdir -p dist
          helm package charts/fastboot-helm-chart --destination dist

      - name: Login to GHCR (Helm registry)
        run: echo "${{ secrets.GHCR_PAT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI
        run: |
          helm push dist/fastboot-helm-chart-${{ env.VERSION }}.tgz oci://ghcr.io/fastboot-io

      # ---------------------------
      # 2) Publish to gh-pages via chart-releaser
      # ---------------------------
      - name: Configure git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
