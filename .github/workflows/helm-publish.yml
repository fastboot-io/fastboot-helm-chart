name: Publish Helm Chart (OCI + gh-pages)

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write     # for gh-pages
      packages: write     # for GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install Helm
      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Extract version (from root Chart.yaml)
      - name: Get chart version
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Chart version is $VERSION"

      # ---------------------------
      # 🟢 Package chart (needed for OCI push)
      # ---------------------------
      - name: Package Helm chart
        run: |
          helm package ./

      # ---------------------------
      # 🟢 Push to OCI (GHCR)
      # ---------------------------
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI
        run: |
          helm push fastboot-helm-chart-${{ env.VERSION }}.tgz oci://ghcr.io/fastboot-io

      # ---------------------------
      # 🔵 Publish to gh-pages
      # ---------------------------
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: .
          skip_existing: true
          packages_with_index: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}