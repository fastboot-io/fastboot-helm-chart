apiVersion: io.fastboot/v1alpha1
kind: PlatformCR
metadata:
  name: {{ .Values.platform.name }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ .Values.platform.name }}
  stage: {{ .Values.platform.stage }}
  version: {{ .Values.platform.version }}

  defaults:
    database:
      storageClass: {{ .Values.platform.defaults.database.storageClass }}
      sizes:
      {{ toYaml .Values.platform.defaults.database.sizes | nindent 8 }}

  services:
    databases:
    {{- if .Values.platform.services.databases }}
    {{- range .Values.platform.services.databases }}
      - name: {{ .name }}
        engine: {{ .engine }}
        version: {{ .version | quote }}
        size: {{ .size }}

        {{- if hasKey . "port" }}
        port: {{ .port }}
        {{- end }}

        {{- if hasKey . "storageClass" }}
        storageClass: {{ .storageClass }}
        {{- end }}
    {{- end }}
    {{- else }}
      []
    {{- end }}