apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.operator.service.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.operator.service.type }}
  selector:
    app: {{ .Values.operator.deployment.selectorLabel }}
  ports:
    - name: http
      port: {{ .Values.operator.service.port }}
      protocol: TCP
      targetPort: {{ .Values.operator.service.targetPort }}