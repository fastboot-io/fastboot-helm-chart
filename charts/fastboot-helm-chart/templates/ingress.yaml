apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.operator.ingress.name }}
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.operator.ingress.ingressClassName }}
  rules:
  - host: {{ .Values.operator.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.operator.service.name }}
            port:
              number: {{ .Values.operator.service.port }}