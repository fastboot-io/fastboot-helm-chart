appName: fastboot

global:
  domain: fastboot.io

artifactory:
  enabled: true
  secretName: artifactory-secret

platform:
  name: fastboot-idp
  stage: prod
  version: 1.0.0
  auth:
    enabled: true
    provider: keycloak
    replicas: 1
    port: 8080
    image: quay.io/keycloak/keycloak
    tag: 24.0.3
    env:
      - name: KEYCLOAK_ADMIN
        value: admin
      - name: KEYCLOAK_ADMIN_PASSWORD
        value: admin
  defaults:
    database:
      storageClass: local-path
      sizes:
        SMALL:
          storage: 5Gi
          cpu: 250m
          memory: 512Mi
        MEDIUM:
          storage: 10Gi
          cpu: 500m
          memory: 1Gi
        LARGE:
          storage: 50Gi
          cpu: 1000m
          memory: 2Gi
  services:
    databases: []

operator:
  rbac:
    serviceAccountName: fastboot-sa
    clusterRoleName: fastboot-role
    clusterRoleBindingName: fastboot-role-binding

  image:
    repository: ghcr.io/fastboot-io/fastboot
    tag: 1.0.0
    pullPolicy: IfNotPresent

  deployment:
    name: fastboot-operator
    appName: fastboot-operator
    replicas: 1
    port: 8081
    selectorLabel: fastboot-operator
    resources:
      requests:
        cpu: "100m"
        memory: "200Mi"
      limits:
        cpu: "500m"
        memory: "500Mi"
    env:
      - name: KUBERNETES_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB
        value: "INFO"

  service:
    name: fastboot-rest-api-service
    type: ClusterIP
    port: 8081
    targetPort: 8081

  ingress:
    name: fastboot-rest-api-ingress
    host: api.fastboot.io
    ingressClassName: nginx